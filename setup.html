<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Susi App - Setup</title>
<style>
body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; background: #f5f5f5; }
.card { background: white; border-radius: 12px; padding: 20px; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
h1 { color: #E91E7B; font-size: 1.3rem; }
.ok { color: #2e7d32; font-weight: bold; }
.err { color: #c62828; font-weight: bold; }
.info { color: #666; font-size: 0.9rem; }
button { background: #E91E7B; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 1rem; cursor: pointer; width: 100%; margin-top: 12px; }
button:disabled { background: #ccc; }
#log { font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; margin-top: 12px; }
</style>
</head>
<body>

<div class="card">
<h1>Susi's Alltagshilfe - Setup</h1>
<p class="info">Diese Seite richtet die API-Keys in der App-Datenbank ein. Einmalig ausführen, danach kann die Datei gelöscht werden.</p>
<button id="btnSetup" onclick="runSetup()">API-Keys einrichten</button>
<div id="log"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
<script>
async function runSetup() {
  const btn = document.getElementById('btnSetup');
  const log = document.getElementById('log');
  btn.disabled = true;

  function msg(text, cls) {
    log.innerHTML += `<span class="${cls || ''}">${text}</span>\n`;
  }

  try {
    msg('Öffne Datenbank...');
    const db = new Dexie('SusiAlltagshilfe');

    // Schema muss identisch mit der App sein
    db.version(1).stores({
      kunden: '++id, name, versichertennummer, pflegekasse, pflegegrad, strasse, plz, ort, telefon, email, faxKasse, besonderheiten, erstellt, aktualisiert',
      leistungen: '++id, kundeId, datum, startzeit, endzeit, betreuung, alltagsbegleitung, pflegebegleitung, hauswirtschaft, notizen, unterschrift, erstellt',
      fahrten: '++id, datum, wochentag, startAdresse, zielAdressen, strecken, gesamtKm, betrag, gpsTrack, erstellt',
      termine: '++id, kundeId, titel, datum, startzeit, endzeit, wiederkehrend, wiederholungsMuster, farbe, notizen, erstellt',
      abtretungen: '++id, kundeId, datum, ort, pflegekasse, unterschrift, pdfData, erstellt',
      rechnungen: '++id, kundeId, rechnungsnummer, monat, jahr, betrag, status, versandart, versandDatum, bezahltDatum, notizen, erstellt',
      settings: 'key'
    });
    db.version(2).stores({
      kunden: '++id, name, versichertennummer, pflegekasse, pflegegrad, strasse, plz, ort, telefon, email, faxKasse, geburtstag, besonderheiten, erstellt, aktualisiert',
      leistungen: '++id, kundeId, datum, startzeit, endzeit, betreuung, alltagsbegleitung, pflegebegleitung, hauswirtschaft, notizen, unterschrift, erstellt',
      fahrten: '++id, datum, wochentag, startAdresse, zielAdressen, strecken, gesamtKm, betrag, gpsTrack, erstellt',
      termine: '++id, kundeId, titel, datum, startzeit, endzeit, wiederkehrend, wiederholungsMuster, farbe, notizen, erstellt',
      abtretungen: '++id, kundeId, datum, ort, pflegekasse, unterschrift, pdfData, erstellt',
      rechnungen: '++id, kundeId, rechnungsnummer, monat, jahr, betrag, status, versandart, versandDatum, bezahltDatum, notizen, erstellt',
      settings: 'key'
    });
    db.version(3).stores({
      kunden: '++id, name, versichertennummer, pflegekasse, pflegegrad, strasse, plz, ort, telefon, email, faxKasse, geburtstag, besonderheiten, lexofficeId, erstellt, aktualisiert',
      leistungen: '++id, kundeId, datum, startzeit, endzeit, betreuung, alltagsbegleitung, pflegebegleitung, hauswirtschaft, notizen, unterschrift, erstellt',
      fahrten: '++id, datum, wochentag, startAdresse, zielAdressen, strecken, gesamtKm, betrag, gpsTrack, erstellt',
      termine: '++id, kundeId, titel, datum, startzeit, endzeit, wiederkehrend, wiederholungsMuster, farbe, notizen, erstellt',
      abtretungen: '++id, kundeId, datum, ort, pflegekasse, unterschrift, pdfData, erstellt',
      rechnungen: '++id, kundeId, rechnungsnummer, monat, jahr, betrag, status, versandart, versandDatum, bezahltDatum, lexofficeInvoiceId, notizen, erstellt',
      settings: 'key'
    });

    await db.open();
    msg('Datenbank geöffnet', 'ok');

    // Keys eintragen
    const keys = {
      'lexoffice_api_key': 'kzAeRoHHYYjQWttmjpuEaVJWv_iLfZcxNzNplNDOwZ5tSxZV',
    };

    for (const [key, value] of Object.entries(keys)) {
      await db.settings.put({ key, value });
      const masked = value.substring(0, 6) + '...' + value.substring(value.length - 4);
      msg(`✓ ${key} = ${masked}`, 'ok');
    }

    // Prüfen
    const check = await db.settings.get('lexoffice_api_key');
    if (check && check.value === keys['lexoffice_api_key']) {
      msg('\n✅ Alle Keys erfolgreich eingerichtet!', 'ok');
      msg('\nDu kannst dieses Fenster schließen und die App normal verwenden.', 'info');
    } else {
      msg('\n❌ Prüfung fehlgeschlagen', 'err');
    }

    db.close();
  } catch (e) {
    msg('❌ Fehler: ' + e.message, 'err');
    msg('\nBitte zuerst die App einmal öffnen (christophglunz-del.github.io/susi-app/), dann diese Seite erneut laden.', 'info');
  }

  btn.disabled = false;
  btn.textContent = 'Nochmal ausführen';
}
</script>
</body>
</html>
